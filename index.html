<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LEGENDARY MOTORSPORT</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <header id="header"></header>

  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Legendary<br/><em>Motorsport</em></h1>
      <h2><span class="hero-subtitle">La elegancia en 4 ruedas</span></h2>
      <p class="hero-desc">Cada vehículo es una obra maestra de ingeniería y diseño, creada para quienes entienden que un coche es mucho más que un medio de transporte.</p>
      <a href="Catalogo.html" class="btn-primary">Ver Catálogo Completo</a>
    </div>
    <div class="hero-decoration">
      <div class="circle-lg"></div>
      <div class="circle-sm"></div>
    </div>
  </section>

  <!-- Novedades: 2 primeras tarjetas del catálogo (inyectadas por JS) -->
  <section id="coleccion" class="coleccion" style="background:var(--dark-2)">
    <div class="section-header">
      <span class="section-label">— Recién llegados —</span>
      <h2 style="color:var(--light)">Novedades</h2>
    </div>
    <div class="productos" id="catalogo-grid"></div>
  </section>

  <footer class="footer"></footer>
  <script src="main.js"></script>
</body>
</html>
