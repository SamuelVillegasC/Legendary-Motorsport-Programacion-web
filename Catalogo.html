<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <title>Legendary Motorsport — Catálogo</title>
</head>
<body class="page-catalogo">

  <header id="header"></header>

  <section class="catalogo-hero">
    <div class="catalogo-hero-content">
      <span class="section-label">— Colección Completa —</span>
      <h1 class="hero-title">Nuestros<br/><em>Vehículos</em></h1>
    </div>
  </section>

  <section id="coleccion" class="coleccion">
    <div class="section-header">

      <!-- Filtros -->
      <div class="filtros-bar">
        <div class="filtro-grupo">
          <label for="catalogo-search">Buscar</label>
          <input type="text" id="catalogo-search" placeholder="Nombre o marca..." autocomplete="off"/>
        </div>
        <div class="filtro-grupo">
          <label for="filtro-marca">Marca</label>
          <select id="filtro-marca">
            <option value="">Todas las marcas</option>
          </select>
        </div>
        <div class="filtro-grupo">
          <label for="filtro-precio">Precio</label>
          <select id="filtro-precio">
            <option value="">Sin ordenar</option>
            <option value="asc">Menor a mayor</option>
            <option value="desc">Mayor a menor</option>
          </select>
        </div>
        <a href="Admin.html" class="btn-admin-link">⚙ Administrar</a>
      </div>

    </div>

    <!-- Las tarjetas las inyecta main.js -->
    <div class="productos" id="catalogo-grid"></div>

  </section>

  <footer class="footer"></footer>
  <script src="main.js"></script>
</body>
</html>
